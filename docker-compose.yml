services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
      # Override UPLOAD_DIR so files go to the shared volume
      UPLOAD_DIR: /app/uploads
    volumes:
      - uploads:/app/uploads
    expose:
      - "3000"
    depends_on: []  # PostgreSQL is external — no dependency block needed
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - uploads:/app/uploads:ro
    depends_on:
      - app

volumes:
  uploads:
